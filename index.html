<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tarefas Diárias · Poly Odonto</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="theme-color" content="#1B2A4A" />
<style>
  :root{
    --navy:#1B2A4A;
    --navy-light:#2D4373;
    --navy-soft:#EEF1F6;
    --gold:#C9A227;
    --gold-soft:#F3E9C8;
    --cream:#FAF8F4;
    --border:#E3DFD6;
    --text:#26262A;
    --muted:#8B8678;
    --danger:#B5443A;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'DM Sans', Arial, sans-serif;
    background:var(--cream);
    color:var(--text);
  }
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Cormorant+Garamond:wght@600;700&display=swap');

  .header{
    background:#fff;
    border-bottom:1px solid var(--border);
    padding:16px 20px;
    display:flex;
    align-items:center;
    gap:14px;
  }
  .header img{
    width:46px;height:46px;border-radius:8px;flex-shrink:0;
  }
  .header .title{
    font-family:'Cormorant Garamond', serif;
    font-weight:700;
    font-size:22px;
    color:var(--navy);
    line-height:1.1;
  }
  .header .subtitle{
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:600;
    margin-top:2px;
  }

  .tabs{
    display:flex;
    border-bottom:1px solid var(--border);
    background:#fff;
  }
  .tab{
    display:flex;align-items:center;gap:8px;
    padding:12px 20px;
    font-size:14px;font-weight:500;
    color:var(--muted);
    border:none;background:none;cursor:pointer;
    border-bottom:2px solid transparent;
  }
  .tab.active{color:var(--navy);border-bottom-color:var(--gold);}

  .content{
    padding:20px;
    max-width:760px;
    margin:0 auto;
  }
  .today-grid, .report-grid{
    display:grid;
    grid-template-columns: 1fr;
    gap:0;
  }
  @media (min-width: 900px){
    .content{max-width:1100px;}
    .today-grid{
      grid-template-columns: 1fr 1fr;
      column-gap:32px;
      align-items:start;
    }
    .report-grid{
      grid-template-columns: 1fr 1fr;
      column-gap:24px;
      align-items:start;
    }
  }

  .row-between{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
  .muted{color:var(--muted);}
  .h-title{font-size:17px;font-weight:600;color:var(--navy);}
  .small{font-size:12px;}

  .select, .input{
    border:1px solid var(--border);
    border-radius:8px;
    padding:8px 12px;
    font-size:14px;
    font-family:inherit;
    background:#fff;
    color:var(--text);
  }
  .select{cursor:pointer;}

  .freq-block{margin-bottom:22px;}
  .freq-heading{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .freq-heading .label{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
  .diamond{width:11px;height:11px;transform:rotate(45deg);flex-shrink:0;}

  .task-row{
    display:flex;align-items:center;gap:12px;
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px;
    background:#fff;
    margin-bottom:8px;
  }
  .task-row.done{background:var(--navy-soft);}
  .task-row.overdue{border-color:var(--danger);background:#FBEAE8;}
  .checkbox{
    width:26px;height:26px;border-radius:6px;flex-shrink:0;
    border:1.5px solid var(--border);
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .checkbox.done{background:var(--navy);border-color:var(--navy);}
  .task-name{font-size:14px;font-weight:500;}
  .task-meta{font-size:12px;color:var(--muted);margin-top:2px;}

  .btn{
    border:none;border-radius:8px;padding:9px 16px;
    font-size:14px;font-weight:600;cursor:pointer;
    font-family:inherit;
  }
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-outline{background:#fff;border:1px solid var(--border);color:var(--navy);}
  .btn-icon{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;}

  .pill{
    font-size:12px;font-weight:600;
    border:1px solid var(--border);background:#fff;color:var(--navy);
    border-radius:999px;padding:6px 14px;cursor:pointer;
  }
  .day-pill{
    font-size:12px;font-weight:600;
    border:1px solid var(--border);background:#fff;color:var(--muted);
    border-radius:999px;padding:5px 11px;cursor:pointer;
    user-select:none;
  }
  .day-pill.active{background:var(--navy);color:#fff;border-color:var(--navy);}

  .card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
  .list-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:#fff;margin-bottom:8px;gap:10px;}

  table{width:100%;border-collapse:collapse;font-size:14px;}
  thead tr{background:var(--navy-soft);}
  th{text-align:left;padding:8px 10px;color:var(--navy);font-weight:600;}
  th.num, td.num{text-align:right;}
  td{padding:8px 10px;border-top:1px solid var(--border);}
  .table-wrap{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:24px;}

  .empty{text-align:center;padding:40px 16px;color:var(--muted);background:#fff;border:1px solid var(--border);border-radius:10px;grid-column:1 / -1;}

  .login-box{max-width:320px;margin:40px auto;text-align:center;}
  .login-box .input{width:100%;margin:12px 0;text-align:center;}
  .error{color:var(--danger);font-size:13px;margin-top:6px;}
  .success{color:var(--navy);font-size:13px;margin-top:6px;}

  .form-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center;}
  .form-row .input, .form-row .select{flex:1;min-width:120px;}
  .field{margin-bottom:6px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;}

  .section{margin-bottom:32px;}
  .section h3{font-size:16px;color:var(--navy);margin:0 0 4px;}
  .loading{padding:60px;text-align:center;color:var(--muted);}

  .bar-row{margin-bottom:12px;}
  .bar-row .bar-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;}
  .bar-track{background:var(--navy-soft);border-radius:6px;height:10px;overflow:hidden;}
  .bar-fill{background:var(--gold);height:100%;}

  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-head{text-align:center;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;padding:4px 0;}
  .cal-cell{
    border:1px solid var(--border);border-radius:8px;background:#fff;
    min-height:50px;padding:5px;cursor:pointer;
    display:flex;flex-direction:column;gap:2px;
  }
  .cal-cell.cal-out{opacity:.35;}
  .cal-cell.cal-today{border-color:var(--gold);border-width:2px;}
  .cal-cell.cal-selected{box-shadow:0 0 0 2px var(--navy) inset;border-color:var(--navy);}
  .cal-daynum{font-size:12px;font-weight:600;color:var(--navy);}
  .cal-count{font-size:10px;font-weight:600;}
  .cal-extra-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);}
  .cal-grid.cal-compact .cal-cell{min-height:34px;padding:3px;border-radius:6px;}
  .cal-grid.cal-compact .cal-daynum{font-size:11px;}
  .cal-grid.cal-compact .cal-count{font-size:9px;}
  .cal-grid.cal-compact .cal-head{font-size:10px;padding:2px 0;}

  @media (max-width:520px){
    .header .title{font-size:18px;}
    .content{padding:14px;}
  }
</style>
</head>

// ---------- Frequency definitions ----------
const FREQ = {
  daily:   { label: 'Diária',         color: '#C9A227' },
  custom:  { label: 'Dias específicos', color: '#2D4373' },
  weekly:  { label: 'Semanal',        color: '#1B2A4A' },
  monthly: { label: 'Mensal',         color: '#8B8678' },
};
const FREQ_ORDER = ['daily','custom','weekly','monthly'];

// Sunday=0 ... Saturday=6
const WEEKDAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const WEEKDAYS_FULL = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const DEFAULT_WORKING_DAYS = [1,2,3,4,5]; // Seg a Sex
const WEEKDAY_ORDER = [1,2,3,4,5,6,0]; // display Seg..Dom

function weekdayPos(dow){
  return WEEKDAY_ORDER.indexOf(dow); // Seg=0 ... Dom=6
}
const MONTH_NAMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
function dayFullLabel(dow){
  if(dow===0) return 'Domingo';
  if(dow===6) return 'Sábado';
  return WEEKDAYS_FULL[dow] + '-feira';
}

// ---------- Date helpers ----------
function todayStr(d = new Date()){
  const off = d.getTimezoneOffset() * 60000;
  return new Date(d - off).toISOString().slice(0,10);
}
function timeStr(d = new Date()){
  return d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
}
function fmtDate(dateStr){
  const [y,m,d] = dateStr.split('-');
  return `${d}/${m}/${y}`;
}
function getDow(dateStr){
  return new Date(dateStr+'T00:00:00').getDay();
}
function weekKey(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const onejan = new Date(d.getFullYear(),0,1);
  const dayNum = Math.floor((d-onejan)/86400000);
  const week = Math.ceil((dayNum+onejan.getDay()+1)/7);
  return `${d.getFullYear()}-W${String(week).padStart(2,'0')}`;
}
function monthKey(dateStr){ return dateStr.slice(0,7); }
function addDays(dateStr, n){
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+n);
  return todayStr(d);
}
function startOfWeek(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1-day;
  d.setDate(d.getDate()+diff);
  return todayStr(d);
}
function startOfMonth(dateStr){ return dateStr.slice(0,8)+'01'; }

function periodKeyFor(task, dateStr){
  if(task.freq==='weekly') return weekKey(dateStr);
  if(task.freq==='monthly') return monthKey(dateStr);
  return dateStr; // daily and custom: tracked per day
}
function periodsInRange(task, start, end, workingDays){
  const keys = new Set();
  let d = start, guard = 0;
  while(d<=end && guard<3700){
    const dow = getDow(d);
    if(task.freq==='daily'){
      if(workingDays.includes(dow)) keys.add(d);
    } else if(task.freq==='custom'){
      if((task.days||[]).includes(dow)) keys.add(d);
    } else if(task.freq==='weekly'){
      keys.add(weekKey(d));
    } else {
      keys.add(monthKey(d));
    }
    d = addDays(d,1);
    guard++;
  }
  return keys;
}
function esc(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function daysLabel(days){
  return (days||[]).slice().sort((a,b)=>WEEKDAY_ORDER.indexOf(a)-WEEKDAY_ORDER.indexOf(b)).map(d=>WEEKDAYS[d]).join(', ');
}

const configRef = doc(db, 'config', 'settings');

onSnapshot(collection(db,'people'), snap=>{
  state.people = snap.docs.map(d=>({id:d.id, ...d.data()})).sort((a,b)=>a.name.localeCompare(b.name,'pt-BR'));
  state.loaded.people = true;
  if(!state.currentPerson && state.people.length) state.currentPerson = state.people[0].id;
  if(state.currentPerson && !state.people.find(p=>p.id===state.currentPerson)){
    state.currentPerson = state.people[0]?.id || '';
  }
  rerender();
});

onSnapshot(collection(db,'tasks'), snap=>{
  state.tasks = snap.docs.map(d=>({id:d.id, ...d.data()}))
    .sort((a,b)=> FREQ_ORDER.indexOf(a.freq)-FREQ_ORDER.indexOf(b.freq)
      || ((a.order ?? 9999)-(b.order ?? 9999))
      || a.name.localeCompare(b.name,'pt-BR'));
  state.loaded.tasks = true;
  rerender();
});

onSnapshot(collection(db,'completions'), snap=>{
  state.completions = snap.docs.map(d=>({id:d.id, ...d.data()}));
  state.loaded.completions = true;
  rerender();
});

onSnapshot(collection(db,'extraTasks'), snap=>{
  state.extraTasks = snap.docs.map(d=>({id:d.id, ...d.data()}));
  state.loaded.extraTasks = true;
  rerender();
});

getDoc(configRef).then(snap=>{
  if(snap.exists()){
    const data = snap.data();
    state.adminPassword = data.adminPassword || 'Senha1@';
    state.workingDays = Array.isArray(data.workingDays) && data.workingDays.length ? data.workingDays : DEFAULT_WORKING_DAYS.slice();
    if(!data.adminPassword || !Array.isArray(data.workingDays)){
      setDoc(configRef, { adminPassword: state.adminPassword, workingDays: state.workingDays }, { merge: true }).catch(()=>{});
    }
  } else {
    state.adminPassword = 'Senha1@';
    state.workingDays = DEFAULT_WORKING_DAYS.slice();
    setDoc(configRef, { adminPassword: state.adminPassword, workingDays: state.workingDays });
  }
  state.loaded.config = true;
  rerender();
}).catch(e=>{

// ---- Reordering tasks ----
function taskGroup(freq){
  return state.tasks.filter(t=>t.freq===freq);
}
async function moveTask(id, dir){
  const task = state.tasks.find(t=>t.id===id);
  if(!task) return;
  const group = taskGroup(task.freq);
  const idx = group.findIndex(t=>t.id===id);
  const swapIdx = dir==='up' ? idx-1 : idx+1;
  if(swapIdx<0 || swapIdx>=group.length) return;
  const updates = group.map((t,i)=>({ id:t.id, order:i }));
  const tmp = updates[idx].order;
  updates[idx].order = updates[swapIdx].order;
  updates[swapIdx].order = tmp;
  await Promise.all(updates.map(u=>updateDoc(doc(db,'tasks',u.id), { order:u.order })));
}
async function sortTaskGroup(freq, dir){
  const group = taskGroup(freq).slice().sort((a,b)=>
    dir==='asc' ? a.name.localeCompare(b.name,'pt-BR') : b.name.localeCompare(a.name,'pt-BR')
  );
  await Promise.all(group.map((t,i)=>updateDoc(doc(db,'tasks',t.id), { order:i })));
}

function getMonthGridDays(monthStr){
  const first = `${monthStr}-01`;
  const offset = weekdayPos(getDow(first)); // Mon=0..Sun=6
  const start = addDays(first, -offset);
  const days = [];
  for(let i=0;i<42;i++) days.push(addDays(start, i));
  return days;
}
function tasksForDate(dateStr){
  const dow = getDow(dateStr);
  const dom = parseInt(dateStr.split('-')[2],10);
  return state.tasks.filter(t=>{
    if(t.freq==='daily') return state.workingDays.includes(dow);
    if(t.freq==='custom') return (t.days||[]).includes(dow);
    if(t.freq==='weekly') return t.dueWeekday != null && t.dueWeekday === dow;
    if(t.freq==='monthly') return t.dueDay != null && t.dueDay === dom;
    return false;
  });
}
function completionForDate(taskId, dateStr){
  return state.completions.find(c=>c.taskId===taskId && c.date===dateStr);
}
function extraTasksForDate(dateStr){
  return state.extraTasks.filter(e=>e.date===dateStr);

function findCurrentCompletion(task){
  const key = periodKeyFor(task, today);
  return state.completions
    .filter(c=>c.taskId===task.id && periodKeyFor(task,c.date)===key)
    .sort((a,b)=> (b.timestamp||'').localeCompare(a.timestamp||''))[0];
}
function isOverdue(task){
  if(findCurrentCompletion(task)) return false;
  if(task.freq === 'monthly' && task.dueDay){
    return parseInt(today.split('-')[2],10) > task.dueDay;
  }
  if(task.freq === 'weekly' && task.dueWeekday != null){
    return weekdayPos(getDow(today)) > weekdayPos(task.dueWeekday);
  }
  return false;
}
function deadlineLabel(task){
  if(task.freq === 'monthly' && task.dueDay) return `até o dia ${task.dueDay}`;
  if(task.freq === 'weekly' && task.dueWeekday != null) return `até ${WEEKDAYS_FULL[task.dueWeekday]}`;
  return '';
}

  const task = state.tasks.find(t=>t.id===taskId);
  if(!task || !state.currentPerson) return;
  const existing = findCurrentCompletion(task);
  if(existing){

  } else {
    const now = new Date();
    const person = state.people.find(p=>p.id===state.currentPerson);
    await addDoc(collection(db,'completions'), {

      taskName: task.name,
      freq: task.freq,
      personId: state.currentPerson,
      personName: person ? person.name : '—',
      date: todayStr(now),
      time: timeStr(now),
      timestamp: now.toISOString(),
    });
  }
}

// ---------- Report calculations ----------
function reportRows(){
  return state.tasks.map(task=>{
    const expectedKeys = periodsInRange(task, state.rangeStart, state.rangeEnd, state.workingDays);
    const matches = state.completions.filter(c=>
      c.taskId===task.id &&
      c.date >= state.rangeStart && c.date <= state.rangeEnd &&
      (state.reportPerson==='all' || c.personId===state.reportPerson)
    );
    const doneKeys = new Set(matches.map(c=>periodKeyFor(task,c.date)));
    const expected = expectedKeys.size;
    const done = [...doneKeys].filter(k=>expectedKeys.has(k)).length;
    return { task, expected, done, pct: expected ? Math.round((done/expected)*100) : 0 };
  });
}
function logRows(){
  return state.completions
    .filter(c=> c.date >= state.rangeStart && c.date <= state.rangeEnd &&
      (state.reportPerson==='all' || c.personId===state.reportPerson))
    .sort((a,b)=> (b.timestamp||'').localeCompare(a.timestamp||''));
}

// ---------- Render ----------
function rerender(){
  const app = document.getElementById('app');
  const activeId = document.activeElement ? document.activeElement.id : null;
  const selStart = (document.activeElement && 'selectionStart' in document.activeElement) ? document.activeElement.selectionStart : null;
  const values = {};
  app.querySelectorAll('input, select').forEach(el=>{ if(el.id) values[el.id]=el.value; });
  app.innerHTML = render();
  Object.entries(values).forEach(([id,val])=>{
    const el = document.getElementById(id);
    if(el && el.type !== 'date') el.value = val;
  });
  if(activeId){
    const el = document.getElementById(activeId);
    if(el){ el.focus(); if(selStart!=null && el.setSelectionRange) { try{ el.setSelectionRange(selStart, selStart); }catch(e){} } }
  }
}

function renderToday(){
  if(!state.people.length){
    return `<div class="empty">Cadastre a equipe na aba Configurar para começar.</div>`;
  }
  if(!state.tasks.length){
    return `<div class="empty">Cadastre as tarefas (diárias, semanais e mensais) na aba Configurar.</div>`;
  }

  const todayDow = getDow(today);
  const personOptions = state.people.map(p=>
    `<option value="${p.id}" ${p.id===state.currentPerson?'selected':''}>${esc(p.name)}</option>`
  ).join('');

  function renderFreqBlock(freq, group){
    let html = `<div class="freq-block">
      <div class="freq-heading">
        <span class="diamond" style="background:${FREQ[freq].color}"></span>
        <span class="label">${FREQ[freq].label}</span>
      </div>`;
    group.forEach(task=>{
      const done = findCurrentCompletion(task);
      let extraInfo = '';
      if(!done){
        const dl = deadlineLabel(task);
        if(dl){
          extraInfo = isOverdue(task)
            ? `<div class="task-meta" style="color:var(--danger);font-weight:600;">Atrasada — prazo era ${dl}</div>`
            : `<div class="task-meta">Prazo: ${dl}</div>`;
        }
      }
      html += `
        <div class="task-row ${done?'done':''} ${isOverdue(task)?'overdue':''}">
          <div class="checkbox ${done?'done':''}" onclick="potToggleTask('${task.id}')">
            ${done ? checkIcon() : ''}
          </div>
          <div>
            <div class="task-name">${esc(task.name)}</div>
            ${done ? `<div class="task-meta">${clockIcon()} ${esc(done.personName)} às ${done.time}${freq!=='daily' && freq!=='custom' ? ' · '+fmtDate(done.date) : ''}</div>` : extraInfo}
          </div>
        </div>`;
    });
    html += `</div>`;
    return html;
  }

  let colDaily = '';
  let colOthers = '';
  let anyVisible = false;
  FREQ_ORDER.forEach(freq=>{
    let group = state.tasks.filter(t=>t.freq===freq);
    if(freq==='daily' && !state.workingDays.includes(todayDow)) group = [];
    if(freq==='custom') group = group.filter(t=>(t.days||[]).includes(todayDow));
    if(!group.length) return;
    anyVisible = true;
    if(freq==='daily'){
      colDaily += renderFreqBlock(freq, group);
    } else {
      colOthers += renderFreqBlock(freq, group);
    }
  });

  let body;
  if(!anyVisible){
    body = `<div class="empty">Nenhuma tarefa prevista para hoje (${WEEKDAYS[todayDow]}).</div>`;
  } else {
    body = `<div>${colDaily}</div><div>${colOthers}</div>`;
  }

  return `
    <div class="row-between">
      <div>
        <div class="muted small">Hoje, ${fmtDate(today)} · ${WEEKDAYS[todayDow]}</div>
        <div class="h-title">Checklist do dia</div>
      </div>
      <select class="select" onchange="potSetCurrentPerson(this.value)">${personOptions}</select>
    </div>
    ${renderCalendarWidget()}
    <div class="today-grid">${body}</div>`;
}

function renderCalendarWidget(){
  const [y,m] = state.calendarMonth.split('-').map(Number);
  const days = getMonthGridDays(state.calendarMonth);

  const headerRow = WEEKDAY_ORDER.map(d=>`<div class="cal-head">${WEEKDAYS[d]}</div>`).join('');

  const cells = days.map(d=>{
    const inMonth = d.slice(0,7) === state.calendarMonth;
    const dayNum = parseInt(d.split('-')[2],10);
    const recurring = tasksForDate(d);
    const doneCount = recurring.filter(t=>completionForDate(t.id,d)).length;
    const extras = extraTasksForDate(d);
    const isToday = d === today;
    const isSelected = d === state.selectedDate;
    let summary = '';
    if(recurring.length){
      const color = doneCount===recurring.length ? 'var(--gold)' : 'var(--muted)';
      summary += `<div class="cal-count" style="color:${color}">${doneCount}/${recurring.length}</div>`;
    }
    if(extras.length){
      summary += `<div class="cal-extra-dot" title="Tarefas extras"></div>`;
    }
    return `<div class="cal-cell ${inMonth?'':'cal-out'} ${isToday?'cal-today':''} ${isSelected?'cal-selected':''}" onclick="potSelectDate('${d}')">
      <div class="cal-daynum">${dayNum}</div>
      ${summary}
    </div>`;
  }).join('');

  const selDate = state.selectedDate;
  const selDow = getDow(selDate);
  const isToday = selDate === today;
  const recurring = isToday ? [] : tasksForDate(selDate);
  const extras = extraTasksForDate(selDate);

  let recurringSection = '';
  if(!isToday){
    let recurringHtml = '';
    if(!recurring.length){
      recurringHtml = `<div class="muted small">Nenhuma tarefa fixa prevista para este dia.</div>`;
    } else {
      recurringHtml = recurring.map(task=>{
        const done = completionForDate(task.id, selDate);
        return `<div class="task-row ${done?'done':''}">
          <div class="checkbox ${done?'done':''}" style="cursor:default;">
            ${done ? checkIcon() : ''}
          </div>
          <div>
            <div class="task-name">${esc(task.name)}</div>
            <div class="task-meta">${done ? `${clockIcon()} ${esc(done.personName)} às ${done.time}` : FREQ[task.freq].label}</div>
          </div>
        </div>`;
      }).join('');
    }
    recurringSection = `
      <div class="muted small" style="margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;">Tarefas previstas</div>
      ${recurringHtml}`;
  }

  let extrasHtml = extras.map(e=>`
    <div class="list-item">
      <span style="display:flex;align-items:center;gap:8px;">
        <div class="checkbox ${e.done?'done':''}" style="width:22px;height:22px;" onclick="potToggleExtraTask('${e.id}')">${e.done?checkIcon():''}</div>
        <span>${esc(e.name)}</span>
        ${e.done ? `<span class="muted small">${esc(e.personName||'')} às ${e.time||''}</span>` : ''}
      </span>
      ${state.isAdmin ? `<button class="btn-icon" onclick="potRemoveExtraTask('${e.id}')">${trashIcon()}</button>` : ''}
    </div>`).join('');
  if(!extras.length) extrasHtml = `<div class="muted small" style="margin-bottom:10px;">Nenhuma tarefa extra para este dia.</div>`;

  const addExtraHtml = state.isAdmin ? `
    <div class="form-row">
      <input id="new-extra-task-name" class="input" placeholder="Nova tarefa para este dia" onkeydown="if(event.key==='Enter') potAddExtraTask()">
      <button class="btn btn-primary" onclick="potAddExtraTask()">Adicionar</button>
    </div>` : '';

  return `
    <div class="card" style="margin-bottom:20px;">
      <div class="row-between" style="margin-bottom:10px;">
        <button class="btn btn-outline" style="padding:6px 12px;" onclick="potShiftCalendarMonth(-1)">‹</button>
        <div class="h-title" style="font-size:14px;">${MONTH_NAMES[m-1]} ${y}</div>
        <button class="btn btn-outline" style="padding:6px 12px;" onclick="potShiftCalendarMonth(1)">›</button>
      </div>
      <div class="cal-grid cal-compact">${headerRow}${cells}</div>

      ${state.calendarOpen ? `
      <div style="margin-top:14px;">
        <div class="row-between" style="margin-bottom:8px;">
          <div class="h-title" style="font-size:14px;">${dayFullLabel(selDow)}, ${fmtDate(selDate)}</div>
          <button class="btn-icon" onclick="potCloseCalendarPanel()">${closeIcon()}</button>
        </div>
        ${recurringSection}
        <div class="muted small" style="margin:16px 0 6px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;">Tarefas extras do dia</div>
        ${extrasHtml}
        ${addExtraHtml}
      </div>` : ''}
    </div>`;
}

  return `
    <div class="login-box">
      <div class="h-title">Área restrita</div>
      <div class="muted small" style="margin-top:6px;">Digite a senha de administrador para acessar.</div>
      <input id="admin-pass-input" class="input" type="password" placeholder="Senha" onkeydown="if(event.key==='Enter') potAdminLogin()" />
      <div><button class="btn btn-primary" onclick="potAdminLogin()">Entrar</button></div>
      ${state.loginError ? `<div class="error">${state.loginError}</div>` : ''}
    </div>`;
}

function renderReport(){
  const rows = reportRows();
  const log = logRows();
  const personOptions = `<option value="all" ${state.reportPerson==='all'?'selected':''}>Todos</option>` +
    state.people.map(p=>`<option value="${p.id}" ${p.id===state.reportPerson?'selected':''}>${esc(p.name)}</option>`).join('');

  let chartHtml = '';
  if(!rows.length){
    chartHtml = `<div class="empty">Nenhuma tarefa cadastrada ainda.</div>`;
  } else {
    chartHtml = `<div class="card">${rows.map(r=>{
      if(r.expected === 0){
        return `<div class="bar-row">
          <div class="bar-label"><span>${esc(r.task.name)}</span><span class="muted small">sem ocorrências no período</span></div>
        </div>`;
      }
      return `<div class="bar-row">
        <div class="bar-label">
          <span>${esc(r.task.name)}</span>
          <span class="muted">${r.done}/${r.expected} feitos (${r.pct}%)</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${r.pct}%"></div></div>
      </div>`;
    }).join('')}</div>`;
  }

  let logHtml = '';
  if(!log.length){
    logHtml = `<div class="empty">Nenhum check registrado nesse período.</div>`;
  } else {
    logHtml = `<div class="table-wrap"><table>
      <thead><tr><th>Data</th><th>Hora</th><th>Tarefa</th><th>Responsável</th></tr></thead>
      <tbody>${log.map(c=>`<tr>
        <td>${fmtDate(c.date)}</td><td>${c.time}</td><td>${esc(c.taskName)}</td><td>${esc(c.personName)}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }

  return `
    <div class="row-between">
      <div class="h-title">Relatório de produtividade</div>
      <button class="btn btn-outline" onclick="potAdminLogout()">Sair do admin</button>
    </div>
    <div class="form-row" style="margin-bottom:6px;">
      <button class="pill" onclick="potQuickRange('today')">Hoje</button>
      <button class="pill" onclick="potQuickRange('week')">Esta semana</button>
      <button class="pill" onclick="potQuickRange('month')">Este mês</button>
    </div>
    <div class="card form-row" style="align-items:flex-end;">
      <div class="field"><label>De</label><input type="date" class="input" value="${state.rangeStart}" onchange="potSetRangeStart(this.value)"></div>
      <div class="field"><label>Até</label><input type="date" class="input" value="${state.rangeEnd}" onchange="potSetRangeEnd(this.value)"></div>
      <div class="field"><label>Responsável</label><select class="select" onchange="potSetReportPerson(this.value)">${personOptions}</select></div>
    </div>

    <div class="h-title" style="font-size:14px;margin-bottom:8px;">Checks feitos x não feitos</div>
    ${chartHtml}

    <div class="h-title" style="font-size:14px;margin-bottom:8px;margin-top:24px;">Histórico de checks</div>
    ${logHtml}`;
}

function renderConfig(){
  const peopleList = state.people.map(p=>{
    if(state.editingPersonId === p.id){
      return `
      <div class="list-item">
        <input id="edit-person-name" class="input" style="flex:1;" value="${esc(p.name)}" onkeydown="if(event.key==='Enter') potSaveEditPerson(); if(event.key==='Escape') potCancelEditPerson();">
        <button class="btn btn-primary" style="padding:6px 12px;" onclick="potSaveEditPerson()">Salvar</button>
        <button class="btn btn-outline" style="padding:6px 12px;" onclick="potCancelEditPerson()">Cancelar</button>
      </div>`;
    }
    return `
    <div class="list-item">
      <span>${esc(p.name)}</span>
      <span style="display:flex;gap:4px;">
        <button class="btn-icon" onclick="potStartEditPerson('${p.id}')">${pencilIcon()}</button>
        <button class="btn-icon" onclick="potRemovePerson('${p.id}')">${trashIcon()}</button>
      </span>
    </div>`;
  }).join('');

  const tasksList = FREQ_ORDER.map(freq=>{
    const group = taskGroup(freq);
    if(!group.length) return '';
    const items = group.map((t,i)=>{
      if(state.editingTaskId === t.id){
        const editFreqOptions = FREQ_ORDER.map(f=>`<option value="${f}" ${state.editTaskFreq===f?'selected':''}>${FREQ[f].label}</option>`).join('');
        const editDaysHtml = state.editTaskFreq === 'custom' ? `
          <div class="form-row" style="margin-top:6px;">
            ${WEEKDAY_ORDER.map(d=>`<span class="day-pill ${state.editTaskDays.includes(d)?'active':''}" onclick="potToggleEditTaskDay(${d})">${WEEKDAYS[d]}</span>`).join('')}
          </div>` : '';
        const editDueHtml = state.editTaskFreq === 'monthly' ? `
          <div class="form-row" style="margin-top:6px;align-items:center;">
            <label class="muted small" style="margin:0;">Prazo: até o dia</label>
            <input id="edit-task-due" type="number" min="1" max="31" class="input" style="max-width:80px;flex:none;" value="${state.editTaskDueDay||''}" placeholder="ex: 10">
            <span class="muted small">do mês (opcional)</span>
          </div>` : state.editTaskFreq === 'weekly' ? `
          <div class="form-row" style="margin-top:6px;align-items:center;">
            <label class="muted small" style="margin:0;">Prazo: até</label>
            <select id="edit-task-due-weekday" class="select" style="flex:none;">
              <option value="">sem prazo fixo</option>
              ${WEEKDAY_ORDER.map(d=>`<option value="${d}" ${String(d)===state.editTaskDueWeekday?'selected':''}>${WEEKDAYS_FULL[d]}</option>`).join('')}
            </select>
            <span class="muted small">(opcional)</span>
          </div>` : '';
        return `
        <div class="list-item" style="flex-direction:column;align-items:stretch;">
          <div class="form-row" style="margin-top:0;">
            <input id="edit-task-name" class="input" value="${esc(t.name)}" onkeydown="if(event.key==='Escape') potCancelEditTask();">
            <select class="select" onchange="potSetEditTaskFreq(this.value)">${editFreqOptions}</select>
          </div>
          ${editDaysHtml}
          ${editDueHtml}
          <div class="form-row">
            <button class="btn btn-primary" onclick="potSaveEditTask()">Salvar</button>
            <button class="btn btn-outline" onclick="potCancelEditTask()">Cancelar</button>
          </div>
        </div>`;
      }
      const freqLabel = t.freq==='custom' ? daysLabel(t.days)
        : (t.freq==='monthly' && t.dueDay ? `vence até dia ${t.dueDay}`
        : (t.freq==='weekly' && t.dueWeekday != null ? `vence ${WEEKDAYS_FULL[t.dueWeekday]}` : ''));
      return `
      <div class="list-item">
        <span style="display:flex;align-items:center;gap:8px;">
          <span class="diamond" style="width:10px;height:10px;background:${FREQ[t.freq].color}"></span>
          ${esc(t.name)} ${freqLabel ? `<span class="muted small">(${freqLabel})</span>` : ''}
        </span>
        <span style="display:flex;gap:2px;align-items:center;">
          <button class="btn-icon" ${i===0?'disabled style="opacity:.3;"':''} onclick="potMoveTask('${t.id}','up')">${upIcon()}</button>
          <button class="btn-icon" ${i===group.length-1?'disabled style="opacity:.3;"':''} onclick="potMoveTask('${t.id}','down')">${downIcon()}</button>
          <button class="btn-icon" onclick="potStartEditTask('${t.id}')">${pencilIcon()}</button>
          <button class="btn-icon" onclick="potRemoveTask('${t.id}')">${trashIcon()}</button>
        </span>
      </div>`;
    }).join('');

    return `
      <div style="margin-bottom:14px;">
        <div class="row-between" style="margin-bottom:6px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="diamond" style="background:${FREQ[freq].color}"></span>
            <span class="label" style="font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);">${FREQ[freq].label}</span>
          </div>
          <div style="display:flex;gap:6px;">
            <button class="pill" onclick="potSortTaskGroup('${freq}','asc')">A → Z</button>
            <button class="pill" onclick="potSortTaskGroup('${freq}','desc')">Z → A</button>
          </div>
        </div>
        ${items}
      </div>`;
  }).join('');

  const freqOptions = FREQ_ORDER.map(f=>`<option value="${f}" ${state.newTaskFreq===f?'selected':''}>${FREQ[f].label}</option>`).join('');

  const newTaskDaysHtml = state.newTaskFreq === 'custom' ? `
    <div class="form-row" style="margin-top:6px;">
      ${WEEKDAY_ORDER.map(d=>`<span class="day-pill ${state.newTaskDays.includes(d)?'active':''}" onclick="potToggleNewTaskDay(${d})">${WEEKDAYS[d]}</span>`).join('')}
    </div>` : '';

  const newTaskDueHtml = state.newTaskFreq === 'monthly' ? `
    <div class="form-row" style="margin-top:6px;align-items:center;">
      <label class="muted small" style="margin:0;">Prazo: até o dia</label>
      <input id="new-task-due" type="number" min="1" max="31" class="input" style="max-width:80px;flex:none;" placeholder="ex: 10">
      <span class="muted small">do mês (opcional)</span>
    </div>` : state.newTaskFreq === 'weekly' ? `
    <div class="form-row" style="margin-top:6px;align-items:center;">
      <label class="muted small" style="margin:0;">Prazo: até</label>
      <select id="new-task-due-weekday" class="select" style="flex:none;">
        <option value="">sem prazo fixo</option>
        ${WEEKDAY_ORDER.map(d=>`<option value="${d}">${WEEKDAYS_FULL[d]}</option>`).join('')}
      </select>
      <span class="muted small">(opcional)</span>
    </div>` : '';

  const workingDaysHtml = WEEKDAY_ORDER.map(d=>`<span class="day-pill ${state.workingDays.includes(d)?'active':''}" onclick="potToggleWorkingDay(${d})">${WEEKDAYS[d]}</span>`).join('');

  return `
    <div class="row-between">
      <div class="h-title">Configurações</div>
      <button class="btn btn-outline" onclick="potAdminLogout()">Sair do admin</button>
    </div>

    <div class="section">
      <h3>Dias de funcionamento do consultório</h3>
      <div class="muted small" style="margin-bottom:10px;">Usado para calcular o esperado das tarefas diárias no relatório.</div>
      <div class="card">
        <div class="form-row">${workingDaysHtml}</div>
        <div class="form-row">
          <button class="btn btn-primary" onclick="potSaveWorkingDays()">Salvar dias</button>
        </div>
        ${state.wdError ? `<div class="error">${state.wdError}</div>` : ''}
        ${state.wdSuccess ? `<div class="success">${state.wdSuccess}</div>` : ''}
      </div>
    </div>

    <div class="section">
      <h3>Equipe</h3>
      <div class="muted small" style="margin-bottom:10px;">Quem vai registrar os checks diariamente.</div>
      ${peopleList || '<div class="empty">Nenhuma pessoa cadastrada.</div>'}
      <div class="form-row">
        <input id="new-person-name" class="input" placeholder="Nome da pessoa" onkeydown="if(event.key==='Enter') potAddPerson()">
        <button class="btn btn-primary" onclick="potAddPerson()">Adicionar</button>
      </div>
    </div>

    <div class="section">
      <h3>Tarefas</h3>
      <div class="muted small" style="margin-bottom:10px;">Cadastre as tarefas diárias, em dias específicos, semanais ou mensais.</div>
      ${tasksList || '<div class="empty">Nenhuma tarefa cadastrada.</div>'}
      <div class="form-row">
        <input id="new-task-name" class="input" placeholder="Nome da tarefa" onkeydown="if(event.key==='Enter') potAddTask()">
        <select id="new-task-freq" class="select" onchange="potSetNewTaskFreq(this.value)">${freqOptions}</select>
        <button class="btn btn-primary" onclick="potAddTask()">Adicionar</button>
      </div>
      ${newTaskDaysHtml}
      ${newTaskDueHtml}
    </div>

    <div class="section">
      <h3>Alterar senha do administrador</h3>
      <div class="card">
        <div class="field"><label>Senha atual</label><input id="current-pass" type="password" class="input" style="width:100%"></div>
        <div class="field"><label>Nova senha</label><input id="new-pass" type="password" class="input" style="width:100%"></div>
        <div class="field"><label>Confirmar nova senha</label><input id="new-pass-confirm" type="password" class="input" style="width:100%"></div>
        <button class="btn btn-primary" onclick="potChangePassword()">Salvar nova senha</button>
        ${state.pwError ? `<div class="error">${state.pwError}</div>` : ''}
        ${state.pwSuccess ? `<div class="success">${state.pwSuccess}</div>` : ''}
      </div>
    </div>`;
}

function checkIcon(){
  return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#C9A227" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
}
function clockIcon(){
  return `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#8B8678" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`;
}
function trashIcon(){
  return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8B8678" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path></svg>`;
}
function pencilIcon(){
  return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8B8678" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`;
}
function upIcon(){
  return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8B8678" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>`;
}
function downIcon(){
  return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8B8678" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>`;
}
function closeIcon(){
  return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8B8678" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
}

// expose handlers globally
window.potSetTab = setTab;
window.potSetCurrentPerson = setCurrentPerson;
window.potAddPerson = addPerson;
window.potRemovePerson = removePerson;
window.potAddTask = addTask;
window.potRemoveTask = removeTask;
window.potToggleTask = toggleTask;
window.potAdminLogin = adminLogin;
window.potAdminLogout = adminLogout;
window.potChangePassword = changePassword;
window.potQuickRange = setQuickRange;
window.potSetRangeStart = setRangeStart;
window.potSetRangeEnd = setRangeEnd;
window.potSetReportPerson = setReportPerson;
window.potSetNewTaskFreq = setNewTaskFreq;
window.potToggleNewTaskDay = toggleNewTaskDay;
window.potToggleWorkingDay = toggleWorkingDay;
window.potSaveWorkingDays = saveWorkingDays;
window.potStartEditPerson = startEditPerson;
window.potCancelEditPerson = cancelEditPerson;
window.potSaveEditPerson = saveEditPerson;
window.potStartEditTask = startEditTask;
window.potCancelEditTask = cancelEditTask;
window.potSaveEditTask = saveEditTask;
window.potSetEditTaskFreq = setEditTaskFreq;
window.potToggleEditTaskDay = toggleEditTaskDay;
window.potMoveTask = moveTask;
window.potSortTaskGroup = sortTaskGroup;
window.potShiftCalendarMonth = shiftCalendarMonth;
window.potSelectDate = selectDate;
window.potCloseCalendarPanel = closeCalendarPanel;
window.potAddExtraTask = addExtraTask;
window.potToggleExtraTask = toggleExtraTask;
window.potRemoveExtraTask = removeExtraTask;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
