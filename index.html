<title>Tarefas Diárias · Poly Odonto</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1B2A4A" />

<style>
  :root{
    --navy:#1B2A4A;
    --navy-light:#2D4373;
    --navy-soft:#EEF1F6;
    --gold:#C9A227;
    --gold-soft:#F3E9C8;
    --cream:#FAF8F4;
    --border:#E3DFD6;
    --text:#26262A;
    --muted:#8B8678;
    --danger:#B5443A;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'DM Sans', Arial, sans-serif;
    background:var(--cream);
    color:var(--text);
  }
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Cormorant+Garamond:wght@600;700&display=swap');

  .header{
    background:#fff;
    border-bottom:1px solid var(--border);
    padding:16px 20px;
    display:flex;
    align-items:center;
    gap:14px;
  }
  .header img{
    width:46px;height:46px;border-radius:8px;flex-shrink:0;
  }
  .header .title{
    font-family:'Cormorant Garamond', serif;
    font-weight:700;
    font-size:22px;
    color:var(--navy);
    line-height:1.1;
  }
  .header .subtitle{
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:600;
    margin-top:2px;
  }

  .tabs{
    display:flex;
    border-bottom:1px solid var(--border);
    background:#fff;
  }
  .tab{
    display:flex;align-items:center;gap:8px;
    padding:12px 20px;
    font-size:14px;font-weight:500;
    color:var(--muted);
    border:none;background:none;cursor:pointer;
    border-bottom:2px solid transparent;
  }
  .tab.active{color:var(--navy);border-bottom-color:var(--gold);}

  .content{
    padding:20px;
    max-width:760px;
    margin:0 auto;
  }

  .row-between{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
  .muted{color:var(--muted);}
  .h-title{font-size:17px;font-weight:600;color:var(--navy);}
  .small{font-size:12px;}

  .select, .input{
    border:1px solid var(--border);
    border-radius:8px;
    padding:8px 12px;
    font-size:14px;
    font-family:inherit;
    background:#fff;
    color:var(--text);
  }
  .select{cursor:pointer;}

  .freq-block{margin-bottom:22px;}
  .freq-heading{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .freq-heading .label{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
  .diamond{width:11px;height:11px;transform:rotate(45deg);flex-shrink:0;}

  .task-row{
    display:flex;align-items:center;gap:12px;
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px;
    background:#fff;
    margin-bottom:8px;
  }
  .task-row.done{background:var(--navy-soft);}
  .checkbox{
    width:26px;height:26px;border-radius:6px;flex-shrink:0;
    border:1.5px solid var(--border);
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .checkbox.done{background:var(--navy);border-color:var(--navy);}
  .task-name{font-size:14px;font-weight:500;}
  .task-meta{font-size:12px;color:var(--muted);margin-top:2px;}

  .btn{
    border:none;border-radius:8px;padding:9px 16px;
    font-size:14px;font-weight:600;cursor:pointer;
    font-family:inherit;
  }
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-outline{background:#fff;border:1px solid var(--border);color:var(--navy);}
  .btn-icon{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;}

  .pill{
    font-size:12px;font-weight:600;
    border:1px solid var(--border);background:#fff;color:var(--navy);
    border-radius:999px;padding:6px 14px;cursor:pointer;
  }

  .card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
  .list-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:#fff;margin-bottom:8px;}

  table{width:100%;border-collapse:collapse;font-size:14px;}
  thead tr{background:var(--navy-soft);}
  th{text-align:left;padding:8px 10px;color:var(--navy);font-weight:600;}
  th.num, td.num{text-align:right;}
  td{padding:8px 10px;border-top:1px solid var(--border);}
  .table-wrap{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:24px;}

  .empty{text-align:center;padding:40px 16px;color:var(--muted);background:#fff;border:1px solid var(--border);border-radius:10px;}

  .login-box{max-width:320px;margin:40px auto;text-align:center;}
  .login-box .input{width:100%;margin:12px 0;text-align:center;}
  .error{color:var(--danger);font-size:13px;margin-top:6px;}
  .success{color:var(--navy);font-size:13px;margin-top:6px;}

  .form-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .form-row .input, .form-row .select{flex:1;min-width:120px;}
  .field{margin-bottom:6px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;}

  .section{margin-bottom:32px;}
  .section h3{font-size:16px;color:var(--navy);margin:0 0 4px;}
  .loading{padding:60px;text-align:center;color:var(--muted);}

  @media (max-width:520px){
    .header .title{font-size:18px;}
    .content{padding:14px;}
  }
</style>
</head>

// ---------- Frequency definitions ----------
const FREQ = {
  daily:   { label: 'Diária',  color: '#C9A227' },
  weekly:  { label: 'Semanal', color: '#1B2A4A' },
  monthly: { label: 'Mensal',  color: '#8B8678' },
};
const FREQ_ORDER = ['daily','weekly','monthly'];

// ---------- Date helpers ----------
function todayStr(d = new Date()){
  const off = d.getTimezoneOffset() * 60000;
  return new Date(d - off).toISOString().slice(0,10);
}
function timeStr(d = new Date()){
  return d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
}
function fmtDate(dateStr){
  const [y,m,d] = dateStr.split('-');
  return `${d}/${m}/${y}`;
}
function weekKey(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const onejan = new Date(d.getFullYear(),0,1);
  const dayNum = Math.floor((d-onejan)/86400000);
  const week = Math.ceil((dayNum+onejan.getDay()+1)/7);
  return `${d.getFullYear()}-W${String(week).padStart(2,'0')}`;
}
function monthKey(dateStr){ return dateStr.slice(0,7); }
function addDays(dateStr, n){
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+n);
  return todayStr(d);
}
function startOfWeek(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1-day;
  d.setDate(d.getDate()+diff);
  return todayStr(d);
}
function startOfMonth(dateStr){ return dateStr.slice(0,8)+'01'; }
function periodKeyFor(freq, dateStr){
  if(freq==='daily') return dateStr;
  if(freq==='weekly') return weekKey(dateStr);
  return monthKey(dateStr);
}
function periodsInRange(freq,start,end){
  const keys = new Set();
  let d = start, guard = 0;
  while(d<=end && guard<3700){
    keys.add(periodKeyFor(freq,d));
    d = addDays(d,1);
    guard++;
  }
  return keys;
}
function esc(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- State ----------
const today = todayStr();
const state = {
  people: [],
  tasks: [],
  completions: [],
  currentPerson: localStorage.getItem('pot_currentPerson') || '',
  tab: 'today',
  isAdmin: sessionStorage.getItem('pot_isAdmin') === '1',
  adminPassword: null,
  loaded: { people:false, tasks:false, completions:false, config:false },
  loginError: '',
  pwError: '',
  pwSuccess: '',
  rangeStart: startOfWeek(today),
  rangeEnd: today,
  reportPerson: 'all',
};

const configRef = doc(db, 'config', 'settings');

onSnapshot(collection(db,'people'), snap=>{
  state.people = snap.docs.map(d=>({id:d.id, ...d.data()})).sort((a,b)=>a.name.localeCompare(b.name,'pt-BR'));
  state.loaded.people = true;
  if(!state.currentPerson && state.people.length) state.currentPerson = state.people[0].id;
  if(state.currentPerson && !state.people.find(p=>p.id===state.currentPerson)){
    state.currentPerson = state.people[0]?.id || '';
  }
  rerender();
});

onSnapshot(collection(db,'tasks'), snap=>{
  state.tasks = snap.docs.map(d=>({id:d.id, ...d.data()}))
    .sort((a,b)=> FREQ_ORDER.indexOf(a.freq)-FREQ_ORDER.indexOf(b.freq) || a.name.localeCompare(b.name,'pt-BR'));
  state.loaded.tasks = true;
  rerender();
});

onSnapshot(collection(db,'completions'), snap=>{
  state.completions = snap.docs.map(d=>({id:d.id, ...d.data()}));
  state.loaded.completions = true;
  rerender();
});

getDoc(configRef).then(snap=>{
  if(snap.exists() && snap.data().adminPassword){
    state.adminPassword = snap.data().adminPassword;
  } else {
    state.adminPassword = 'Senha1@';
    setDoc(configRef, { adminPassword: 'Senha1@' });
  }
  state.loaded.config = true;
  rerender();
});

// ---------- Mutations ----------
function setTab(tab){ state.tab = tab; state.loginError=''; state.pwError=''; state.pwSuccess=''; rerender(); }

function setCurrentPerson(id){
  state.currentPerson = id;
  localStorage.setItem('pot_currentPerson', id);
  rerender();
}

async function addPerson(){
  const input = document.getElementById('new-person-name');
  const name = input.value.trim();
  if(!name) return;
  await addDoc(collection(db,'people'), { name });
  input.value = '';
}
async function removePerson(id){
  await deleteDoc(doc(db,'people',id));
}
async function addTask(){
  const nameInput = document.getElementById('new-task-name');
  const freqSelect = document.getElementById('new-task-freq');
  const name = nameInput.value.trim();
  if(!name) return;
  await addDoc(collection(db,'tasks'), { name, freq: freqSelect.value });
  nameInput.value = '';
}
async function removeTask(id){
  await deleteDoc(doc(db,'tasks',id));
}

function findCurrentCompletion(task){
  const key = periodKeyFor(task.freq, today);
  return state.completions
    .filter(c=>c.taskId===task.id && periodKeyFor(task.freq,c.date)===key)
    .sort((a,b)=> (b.timestamp||'').localeCompare(a.timestamp||''))[0];
}
async function toggleTask(taskId){
  const task = state.tasks.find(t=>t.id===taskId);
  if(!task || !state.currentPerson) return;
  const existing = findCurrentCompletion(task);
  if(existing){
    await deleteDoc(doc(db,'completions',existing.id));
  } else {
    const now = new Date();
    const person = state.people.find(p=>p.id===state.currentPerson);
    await addDoc(collection(db,'completions'), {
      taskId: task.id,
      taskName: task.name,
      freq: task.freq,
      personId: state.currentPerson,
      personName: person ? person.name : '—',
      date: todayStr(now),
      time: timeStr(now),
      timestamp: now.toISOString(),
    });
  }
}

function adminLogin(){
  const input = document.getElementById('admin-pass-input');
  if(input.value === state.adminPassword){
    state.isAdmin = true;
    sessionStorage.setItem('pot_isAdmin','1');
    state.loginError = '';
  } else {
    state.loginError = 'Senha incorreta.';
  }
  rerender();
}
function adminLogout(){
  state.isAdmin = false;
  sessionStorage.removeItem('pot_isAdmin');
  state.tab = 'today';
  rerender();
}
async function changePassword(){
  const cur = document.getElementById('current-pass').value;
  const nw = document.getElementById('new-pass').value;
  const conf = document.getElementById('new-pass-confirm').value;
  state.pwError=''; state.pwSuccess='';
  if(cur !== state.adminPassword){ state.pwError='Senha atual incorreta.'; rerender(); return; }
  if(!nw || nw.length < 4){ state.pwError='A nova senha precisa ter ao menos 4 caracteres.'; rerender(); return; }
  if(nw !== conf){ state.pwError='As senhas não coincidem.'; rerender(); return; }
  await updateDoc(configRef, { adminPassword: nw });
  state.adminPassword = nw;
  state.pwSuccess = 'Senha alterada com sucesso.';
  rerender();
}

function setQuickRange(type){
  if(type==='today'){ state.rangeStart = today; state.rangeEnd = today; }
  if(type==='week'){ state.rangeStart = startOfWeek(today); state.rangeEnd = today; }
  if(type==='month'){ state.rangeStart = startOfMonth(today); state.rangeEnd = today; }
  rerender();
}
function setRangeStart(v){ state.rangeStart = v; rerender(); }
function setRangeEnd(v){ state.rangeEnd = v; rerender(); }
function setReportPerson(v){ state.reportPerson = v; rerender(); }

// ---------- Report calculations ----------
function reportRows(){
  return state.tasks.map(task=>{
    const expectedKeys = periodsInRange(task.freq, state.rangeStart, state.rangeEnd);
    const matches = state.completions.filter(c=>
      c.taskId===task.id &&
      c.date >= state.rangeStart && c.date <= state.rangeEnd &&
      (state.reportPerson==='all' || c.personId===state.reportPerson)
    );
    const doneKeys = new Set(matches.map(c=>periodKeyFor(task.freq,c.date)));
    const expected = expectedKeys.size;
    const done = [...doneKeys].filter(k=>expectedKeys.has(k)).length;
    return { task, expected, done, pct: expected ? Math.round((done/expected)*100) : 0 };
  });
}
function logRows(){
  return state.completions
    .filter(c=> c.date >= state.rangeStart && c.date <= state.rangeEnd &&
      (state.reportPerson==='all' || c.personId===state.reportPerson))
    .sort((a,b)=> (b.timestamp||'').localeCompare(a.timestamp||''));
}

// ---------- Render ----------
function rerender(){
  const app = document.getElementById('app');
  const activeId = document.activeElement ? document.activeElement.id : null;
  const selStart = (document.activeElement && 'selectionStart' in document.activeElement) ? document.activeElement.selectionStart : null;
  const values = {};
  app.querySelectorAll('input, select').forEach(el=>{ if(el.id) values[el.id]=el.value; });
  app.innerHTML = render();
  Object.entries(values).forEach(([id,val])=>{
    const el = document.getElementById(id);
    if(el && el.type !== 'date') el.value = val;
  });
  if(activeId){
    const el = document.getElementById(activeId);
    if(el){ el.focus(); if(selStart!=null && el.setSelectionRange) { try{ el.setSelectionRange(selStart, selStart); }catch(e){} } }
  }
}

function render(){
  if(!Object.values(state.loaded).every(Boolean)){
    return '<div class="loading">Carregando...</div>';
  }
  return header() + tabsHtml() + `<div class="content">${
    state.tab==='today' ? renderToday() :
    state.tab==='report' ? (state.isAdmin ? renderReport() : renderLogin()) :
    (state.isAdmin ? renderConfig() : renderLogin())
  }</div>`;
}

function header(){
  return `
    <div class="header">
      <img src="${LOGO_SRC}" alt="Poly Odonto" />
      <div>
        <div class="title">Tarefas do Consultório</div>
        <div class="subtitle">Poly Odonto · Recepção &amp; ASB</div>
      </div>
    </div>`;
}

function tabsHtml(){
  const tabs = [
    { id:'today', label:'Hoje' },
    { id:'report', label:'Relatório' },
    { id:'config', label:'Configurar' },
  ];
  return `<div class="tabs">${tabs.map(t=>
    `<button class="tab ${state.tab===t.id?'active':''}" onclick="potSetTab('${t.id}')">${t.label}</button>`
  ).join('')}</div>`;
}

function renderToday(){
  if(!state.people.length){
    return `<div class="empty">Cadastre a equipe na aba Configurar para começar.</div>`;
  }
  if(!state.tasks.length){
    return `<div class="empty">Cadastre as tarefas (diárias, semanais e mensais) na aba Configurar.</div>`;
  }

  const personOptions = state.people.map(p=>
    `<option value="${p.id}" ${p.id===state.currentPerson?'selected':''}>${esc(p.name)}</option>`
  ).join('');

  let body = '';
  FREQ_ORDER.forEach(freq=>{
    const group = state.tasks.filter(t=>t.freq===freq);
    if(!group.length) return;
    body += `<div class="freq-block">
      <div class="freq-heading">
        <span class="diamond" style="background:${FREQ[freq].color}"></span>
        <span class="label">${FREQ[freq].label}</span>
      </div>`;
    group.forEach(task=>{
      const done = findCurrentCompletion(task);
      body += `
        <div class="task-row ${done?'done':''}">
          <div class="checkbox ${done?'done':''}" onclick="potToggleTask('${task.id}')">
            ${done ? checkIcon() : ''}
          </div>
          <div>
            <div class="task-name">${esc(task.name)}</div>
            ${done ? `<div class="task-meta">${clockIcon()} ${esc(done.personName)} às ${done.time}${freq!=='daily' ? ' · '+fmtDate(done.date) : ''}</div>` : ''}
          </div>
        </div>`;
    });
    body += `</div>`;
  });

  return `
    <div class="row-between">
      <div>
        <div class="muted small">Hoje, ${fmtDate(today)}</div>
        <div class="h-title">Checklist do dia</div>
      </div>
      <select class="select" onchange="potSetCurrentPerson(this.value)">${personOptions}</select>
    </div>
    ${body}`;
}

function renderLogin(){
  return `
    <div class="login-box">
      <div class="h-title">Área restrita</div>
      <div class="muted small" style="margin-top:6px;">Digite a senha de administrador para acessar.</div>
      <input id="admin-pass-input" class="input" type="password" placeholder="Senha" onkeydown="if(event.key==='Enter') potAdminLogin()" />
      <div><button class="btn btn-primary" onclick="potAdminLogin()">Entrar</button></div>
      ${state.loginError ? `<div class="error">${state.loginError}</div>` : ''}
    </div>`;
}

function renderReport(){
  const rows = reportRows();
  const log = logRows();
  const personOptions = `<option value="all" ${state.reportPerson==='all'?'selected':''}>Todos</option>` +
    state.people.map(p=>`<option value="${p.id}" ${p.id===state.reportPerson?'selected':''}>${esc(p.name)}</option>`).join('');

  let rowsHtml = '';
  if(!rows.length){
    rowsHtml = `<div class="empty">Nenhuma tarefa cadastrada ainda.</div>`;
  } else {
    rowsHtml = `<div class="table-wrap"><table>
      <thead><tr><th>Tarefa</th><th>Frequência</th><th class="num">Esperado</th><th class="num">Feito</th><th class="num">%</th></tr></thead>
      <tbody>${rows.map(r=>{
        const color = r.pct===100 ? 'var(--navy)' : r.pct===0 ? 'var(--danger)' : 'var(--gold)';
        return `<tr>
          <td>${esc(r.task.name)}</td>
          <td class="muted">${FREQ[r.task.freq].label}</td>
          <td class="num">${r.expected}</td>
          <td class="num">${r.done}</td>
          <td class="num" style="font-weight:700;color:${color}">${r.pct}%</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  }

  let logHtml = '';
  if(!log.length){
    logHtml = `<div class="empty">Nenhum check registrado nesse período.</div>`;
  } else {
    logHtml = `<div class="table-wrap"><table>
      <thead><tr><th>Data</th><th>Hora</th><th>Tarefa</th><th>Responsável</th></tr></thead>
      <tbody>${log.map(c=>`<tr>
        <td>${fmtDate(c.date)}</td><td>${c.time}</td><td>${esc(c.taskName)}</td><td>${esc(c.personName)}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }

  return `
    <div class="row-between">
      <div class="h-title">Relatório de produtividade</div>
      <button class="btn btn-outline" onclick="potAdminLogout()">Sair do admin</button>
    </div>
    <div class="form-row" style="margin-bottom:6px;">
      <button class="pill" onclick="potQuickRange('today')">Hoje</button>
      <button class="pill" onclick="potQuickRange('week')">Esta semana</button>
      <button class="pill" onclick="potQuickRange('month')">Este mês</button>
    </div>
    <div class="card form-row" style="align-items:flex-end;">
      <div class="field"><label>De</label><input type="date" class="input" value="${state.rangeStart}" onchange="potSetRangeStart(this.value)"></div>
      <div class="field"><label>Até</label><input type="date" class="input" value="${state.rangeEnd}" onchange="potSetRangeEnd(this.value)"></div>
      <div class="field"><label>Responsável</label><select class="select" onchange="potSetReportPerson(this.value)">${personOptions}</select></div>
    </div>
    ${rowsHtml}
    <div class="h-title" style="font-size:14px;margin-bottom:8px;">Histórico de checks</div>
    ${logHtml}`;
}

function renderConfig(){
  const peopleList = state.people.map(p=>`
    <div class="list-item">
      <span>${esc(p.name)}</span>
      <button class="btn-icon" onclick="potRemovePerson('${p.id}')">${trashIcon()}</button>
    </div>`).join('');

  const tasksList = state.tasks.map(t=>`
    <div class="list-item">
      <span style="display:flex;align-items:center;gap:8px;">
        <span class="diamond" style="width:10px;height:10px;background:${FREQ[t.freq].color}"></span>
        ${esc(t.name)} <span class="muted small">(${FREQ[t.freq].label})</span>
      </span>
      <button class="btn-icon" onclick="potRemoveTask('${t.id}')">${trashIcon()}</button>
    </div>`).join('');

  const freqOptions = FREQ_ORDER.map(f=>`<option value="${f}">${FREQ[f].label}</option>`).join('');

  return `
    <div class="row-between">
      <div class="h-title">Configurações</div>
      <button class="btn btn-outline" onclick="potAdminLogout()">Sair do admin</button>
    </div>

    <div class="section">
      <h3>Equipe</h3>
      <div class="muted small" style="margin-bottom:10px;">Quem vai registrar os checks diariamente.</div>
      ${peopleList || '<div class="empty">Nenhuma pessoa cadastrada.</div>'}
      <div class="form-row">
        <input id="new-person-name" class="input" placeholder="Nome da pessoa" onkeydown="if(event.key==='Enter') potAddPerson()">
        <button class="btn btn-primary" onclick="potAddPerson()">Adicionar</button>
      </div>
    </div>

    <div class="section">
      <h3>Tarefas</h3>
      <div class="muted small" style="margin-bottom:10px;">Cadastre as tarefas diárias, semanais e mensais.</div>
      ${tasksList || '<div class="empty">Nenhuma tarefa cadastrada.</div>'}
      <div class="form-row">
        <input id="new-task-name" class="input" placeholder="Nome da tarefa" onkeydown="if(event.key==='Enter') potAddTask()">
        <select id="new-task-freq" class="select">${freqOptions}</select>
        <button class="btn btn-primary" onclick="potAddTask()">Adicionar</button>
      </div>
    </div>

    <div class="section">
      <h3>Alterar senha do administrador</h3>
      <div class="card">
        <div class="field"><label>Senha atual</label><input id="current-pass" type="password" class="input" style="width:100%"></div>
        <div class="field"><label>Nova senha</label><input id="new-pass" type="password" class="input" style="width:100%"></div>
        <div class="field"><label>Confirmar nova senha</label><input id="new-pass-confirm" type="password" class="input" style="width:100%"></div>
        <button class="btn btn-primary" onclick="potChangePassword()">Salvar nova senha</button>
        ${state.pwError ? `<div class="error">${state.pwError}</div>` : ''}
        ${state.pwSuccess ? `<div class="success">${state.pwSuccess}</div>` : ''}
      </div>
    </div>`;
}

function checkIcon(){
  return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#C9A227" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
}
function clockIcon(){
  return `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#8B8678" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`;
}
function trashIcon(){
  return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8B8678" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path></svg>`;
}

// expose handlers globally
window.potSetTab = setTab;
window.potSetCurrentPerson = setCurrentPerson;
window.potAddPerson = addPerson;
window.potRemovePerson = removePerson;
window.potAddTask = addTask;
window.potRemoveTask = removeTask;
window.potToggleTask = toggleTask;
window.potAdminLogin = adminLogin;
window.potAdminLogout = adminLogout;
window.potChangePassword = changePassword;
window.potQuickRange = setQuickRange;
window.potSetRangeStart = setRangeStart;
window.potSetRangeEnd = setRangeEnd;
window.potSetReportPerson = setReportPerson;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
